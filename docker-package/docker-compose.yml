version: "3.9"

services:

  # ==========================================
  # API GATEWAY
  # ==========================================
  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    depends_on:
      - auth-service
      - patient-service
      - billing-service
      - appointment-service
    networks:
      - patient-network

  # ==========================================
  # AUTH SERVICE + DB
  # ==========================================
  auth-service:
    container_name: auth-service
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    depends_on:
      - auth-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ##
      SPRING_DATASOURCE_PASSWORD: ##
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ##
    networks:
      - patient-network

  auth-db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ##
      POSTGRES_PASSWORD: ##
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - patient-network

  # ==========================================
  # PATIENT SERVICE + DB
  # ==========================================
  patient-service:
    container_name: patient-service
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
      - "9000:9000"
    depends_on:
      - patient-db
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patient_db
      SPRING_DATASOURCE_USERNAME: ##
      SPRING_DATASOURCE_PASSWORD: ##
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
      GRPC_SERVER_PORT: 9000
    networks:
      - patient-network

  patient-db:
    image: postgres:15
    container_name: patient-db
    restart: always
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: ##
      POSTGRES_PASSWORD: ##
    ports:
      - "5434:5432"
    volumes:
      - patient_db_data:/var/lib/postgresql/data
    networks:
      - patient-network

  # ==========================================
  # BILLING SERVICE
  # ==========================================
  billing-service:
    container_name: billing-service
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    depends_on:
      - billing-db
      - kafka
    ports:
      - "4003:4003"
      - "9003:9003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/billing_db
      SPRING_DATASOURCE_USERNAME: ##
      SPRING_DATASOURCE_PASSWORD: ##
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: billing-group
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      SPRING_PROFILES_ACTIVE: docker
      GRPC_SERVER_PORT: 9003
    networks:
      - patient-network

  billing-db:
    image: postgres:15
    container_name: billing-db
    restart: always
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: ##
      POSTGRES_PASSWORD: ##
    ports:
      - "5436:5432"
    volumes:
      - billing_db_data:/var/lib/postgresql/data
    networks:
      - patient-network

  # ==========================================
  # ZOOKEEPER
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - patient-network

  # ==========================================
  # KAFKA
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - patient-network

  # ==========================================
  # APPOINTMENT SERVICE + DB
  # ==========================================
  appointment-service:
    container_name: appointment-service
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
      - "9002:9002"
    depends_on:
      - appointment-db
      - kafka
      - patient-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-db:5432/appointment_db
      SPRING_DATASOURCE_USERNAME: ##
      SPRING_DATASOURCE_PASSWORD: ##
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
      GRPC_SERVER_PORT: 9002
    networks:
      - patient-network

  appointment-db:
    image: postgres:15
    container_name: appointment-db
    restart: always
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - appointment_db_data:/var/lib/postgresql/data
    networks:
      - patient-network

volumes:
  auth_db_data:
  patient_db_data:
  billing_db_data:
  appointment_db_data:

networks:
  patient-network:
    driver: bridge
