spring.datasource.url=jdbc:postgresql://appointment-db:5432/appointment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

grpc.client.patient-service.address=static://patient-service:9000
grpc.client.patient-service.negotiation-type=plaintext

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.bootstrap-servers=kafka:9092

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.use-fqn=true
springdoc.info.title=Appointment Service API
springdoc.info.description=API for managing Appointments
springdoc.info.version=1.0.0
