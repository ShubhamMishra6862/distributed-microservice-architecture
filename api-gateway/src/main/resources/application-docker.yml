server:
  port: 4004

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: appointment-service-route
          uri: http://appointment-service:4002
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: billing-service-route
          uri: http://billing-service:4003
          predicates:
            - Path=/api/bills/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # API Docs routes for each service
        - id: api-docs-auth
          uri: http://auth-service:4005
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth,/v3/api-docs

        - id: api-docs-patient
          uri: http://patient-service:4000
          predicates:
            - Path=/v3/api-docs/patient
          filters:
            - RewritePath=/v3/api-docs/patient,/v3/api-docs

        - id: api-docs-appointment
          uri: http://appointment-service:4002
          predicates:
            - Path=/v3/api-docs/appointment
          filters:
            - RewritePath=/v3/api-docs/appointment,/v3/api-docs

        - id: api-docs-billing
          uri: http://billing-service:4003
          predicates:
            - Path=/v3/api-docs/bills
          filters:
            - RewritePath=/v3/api-docs/bills,/v3/api-docs

        - id: api-docs-analytics
          uri: http://analytics-service:4006
          predicates:
            - Path=/v3/api-docs/analytics
          filters:
            - RewritePath=/v3/api-docs/analytics,/v3/api-docs

# SpringDoc OpenAPI configuration for gateway aggregation
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth
      - name: Patient Service
        url: /v3/api-docs/patient
      - name: Appointment Service
        url: /v3/api-docs/appointment
      - name: Billing Service
        url: /v3/api-docs/bills
  use-fqn: true



